name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          if [ -f web/package.json ]; then
            cd web
            npm ci
            if npm run | grep -q " lint"; then
              npm run lint
            else
              echo "No lint script found in web/package.json. Skipping npm lint."
            fi
          elif [ -f package.json ]; then
            npm ci
            if npm run | grep -q " lint"; then
              npm run lint
            else
              echo "No lint script found in package.json. Skipping npm lint."
            fi
          else
            echo "No package.json found. Running static lint checks."
            test -s index.html
            test -s assets/css/main.css
            test -s assets/js/main.js
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if [ -f web/package.json ]; then
            cd web
            npm ci
            if npm run | grep -q " test"; then
              npm test -- --ci
            else
              echo "No test script found in web/package.json. Running smoke checks."
              test -s app/page.tsx
            fi
          elif [ -f package.json ]; then
            npm ci
            if npm run | grep -q " test"; then
              npm test -- --ci
            else
              echo "No test script found in package.json. Running smoke checks."
              test -s index.html
            fi
          else
            echo "No package.json found. Running smoke checks."
            test -s index.html
            grep -q "<!DOCTYPE html>" index.html
            grep -q "id=\"hero\"" index.html
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ -f web/package.json ]; then
            cd web
            npm ci
            if npm run | grep -q " build"; then
              npm run build
            else
              echo "No build script found in web/package.json. Skipping npm build."
            fi
          elif [ -f package.json ]; then
            npm ci
            if npm run | grep -q " build"; then
              npm run build
            else
              echo "No build script found in package.json. Skipping npm build."
            fi
          else
            echo "No package.json found. Running static build check."
            mkdir -p dist
            cp index.html dist/index.html
            test -s dist/index.html
          fi
