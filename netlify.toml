[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "ASAAS_ENVIRONMENT,BOOKING_TIMEZONE,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,WHATSAPP_BARBER_PHONE,WHATSAPP_CLOUD_API_VERSION,WHATSAPP_CLOUD_TEMPLATE_LANGUAGE,WHATSAPP_CLOUD_TEMPLATE_NAME"

[[plugins]]
  package = "@netlify/plugin-nextjs"
